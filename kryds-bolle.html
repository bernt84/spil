<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kryds og bolle">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3d2e'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='%23e8c468'%3E%E2%9C%95%3C/text%3E%3C/svg%3E">
<title>Kryds og bolle</title>
<style>
  :root{--felt:#0a3d2e;--felt-2:#0d4a37;--felt-line:#10573f;--gold:#e8c468;--gold-dim:#b89640;--cream:#f3ead6;--ink:#0a2018;--x:#e8c468;--o:#5fae84;--shadow:rgba(0,0,0,.4);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;}
  body{font-family:"Georgia",serif;background:radial-gradient(ellipse at 50% 0%, var(--felt-2), var(--felt) 75%);color:var(--cream);min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top) 12px 16px;}
  .wrap{max-width:420px;margin:0 auto;}
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 2px 6px;}
  .topbar h1{flex:1;font-size:19px;margin:0;color:var(--gold);font-variant:small-caps;letter-spacing:1px;}
  .btn{font-family:inherit;font-size:14px;border:1px solid var(--felt-line);border-radius:9px;padding:8px 11px;cursor:pointer;background:transparent;color:var(--gold);}
  .btn.solid{background:var(--gold);color:var(--ink);border:none;font-weight:bold;}
  .btn:active{transform:translateY(1px);}
  a.btn{text-decoration:none;display:inline-block;}
  .seg{display:flex;border:1px solid var(--felt-line);border-radius:10px;overflow:hidden;margin:8px 0;}
  .seg button{flex:1;font-family:inherit;background:transparent;color:var(--cream);border:none;padding:11px 6px;cursor:pointer;font-size:14px;}
  .seg button.active{background:var(--gold);color:var(--ink);font-weight:bold;}
  .status{text-align:center;font-size:17px;margin:10px 0;color:var(--gold);min-height:24px;}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;aspect-ratio:1;}
  .cell{background:var(--felt-2);border:1px solid var(--felt-line);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18vw;max-font-size:90px;cursor:pointer;font-weight:bold;line-height:1;}
  .cell.x{color:var(--x);}.cell.o{color:var(--o);}
  .cell.win{background:rgba(232,196,104,.2);}
  @media(min-width:420px){.cell{font-size:80px;}}
  .scores{display:flex;justify-content:space-around;margin-top:14px;font-size:14px;color:var(--gold-dim);}
  .scores b{color:var(--cream);font-size:20px;display:block;}
  .controls{margin-top:14px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="btn" href="index.html">‹ Menu</a>
    <h1>Kryds og bolle</h1>
  </div>
  <div class="seg" id="modeSeg">
    <button data-mode="ai" class="active">Mod computer</button>
    <button data-mode="two">To spillere</button>
  </div>
  <div class="seg" id="lvlSeg">
    <button data-lvl="easy">Let</button>
    <button data-lvl="hard" class="active">Umulig</button>
  </div>
  <div class="status" id="status">Din tur (✕)</div>
  <div class="board" id="board"></div>
  <div class="scores">
    <div>✕<b id="sx">0</b></div>
    <div>Uafgjort<b id="sd">0</b></div>
    <div>O<b id="so">0</b></div>
  </div>
  <div class="controls"><button class="btn solid" id="newBtn" style="width:100%;padding:13px;">Nyt spil</button></div>
</div>

<script>
const $=id=>document.getElementById(id);
const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board,turn,mode='ai',lvl='hard',over,wins={x:0,o:0,d:0};

function init(){board=Array(9).fill('');turn='x';over=false;render();updStatus();if(mode==='ai'&&turn==='o')setTimeout(aiMove,300);}
function render(){
  const b=$('board');b.innerHTML='';
  board.forEach((v,i)=>{
    const c=document.createElement('div');c.className='cell'+(v?' '+v:'');
    c.textContent=v==='x'?'✕':v==='o'?'O':'';
    c.onclick=()=>play(i);
    b.appendChild(c);
  });
}
function play(i){
  if(over||board[i])return;
  if(mode==='ai'&&turn!=='x')return;
  board[i]=turn;render();
  if(check())return;
  turn=turn==='x'?'o':'x';updStatus();
  if(mode==='ai'&&turn==='o'&&!over)setTimeout(aiMove,300);
}
function updStatus(){$('status').textContent=over?'':mode==='ai'?(turn==='x'?'Din tur (✕)':'Computeren tænker…'):`${turn==='x'?'✕':'O'} er i tur`;}
function winner(bd){for(const[a,b,c]of WINS)if(bd[a]&&bd[a]===bd[b]&&bd[a]===bd[c])return{who:bd[a],line:[a,b,c]};if(bd.every(x=>x))return{who:'d'};return null;}
function check(){
  const w=winner(board);if(!w)return false;over=true;
  if(w.who==='d'){wins.d++;$('status').textContent='Uafgjort';}
  else{wins[w.who]++;$('status').textContent=(w.who==='x'?'✕':'O')+' vinder!';w.line.forEach(i=>$('board').children[i].classList.add('win'));}
  $('sx').textContent=wins.x;$('so').textContent=wins.o;$('sd').textContent=wins.d;
  return true;
}
function aiMove(){
  if(over)return;
  let move;
  const empty=board.map((v,i)=>v?null:i).filter(i=>i!==null);
  if(lvl==='easy'&&Math.random()<0.5)move=empty[Math.floor(Math.random()*empty.length)];
  else move=minimax(board,'o').index;
  if(move!=null){board[move]='o';render();if(check())return;turn='x';updStatus();}
}
function minimax(bd,player){
  const w=winner(bd);
  if(w){if(w.who==='o')return{score:10};if(w.who==='x')return{score:-10};return{score:0};}
  const empty=bd.map((v,i)=>v?null:i).filter(i=>i!==null);
  let best=player==='o'?{score:-Infinity}:{score:Infinity};
  for(const i of empty){
    bd[i]=player;
    const res=minimax(bd,player==='o'?'x':'o');
    bd[i]='';
    if(player==='o'){if(res.score>best.score)best={score:res.score,index:i};}
    else{if(res.score<best.score)best={score:res.score,index:i};}
  }
  return best;
}
$('modeSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.mode;[...$('modeSeg').children].forEach(x=>x.classList.toggle('active',x===b));$('lvlSeg').style.display=mode==='ai'?'':'none';init();};
$('lvlSeg').onclick=e=>{const b=e.target.closest('button');if(!b)return;lvl=b.dataset.lvl;[...$('lvlSeg').children].forEach(x=>x.classList.toggle('active',x===b));init();};
$('newBtn').onclick=init;
init();
</script>
</body>
</html>
