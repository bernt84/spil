<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minestryger">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3d2e'/%3E%3Ctext x='32' y='46' font-size='38' text-anchor='middle'%3E%F0%9F%92%A3%3C/text%3E%3C/svg%3E">
<title>Minestryger</title>
<style>
  :root{
    --felt:#0a3d2e; --felt-2:#0d4a37; --felt-line:#10573f;
    --gold:#e8c468; --gold-dim:#b89640;
    --cream:#f3ead6; --ink:#0a2018;
    --red:#c0392b;
    --cell:#0f5240; --cell-up:#147055; --cell-down:#0a3a2c;
    --shadow:rgba(0,0,0,.4);
    --n1:#7fb7ff; --n2:#74d39a; --n3:#e88; --n4:#b69cff; --n5:#e8b86a; --n6:#5fd0d0; --n7:#d8d8d8; --n8:#9a9a9a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Georgia","Times New Roman",serif;
    background:radial-gradient(ellipse at 50% 0%, var(--felt-2), var(--felt) 75%);
    color:var(--cream);min-height:100vh;min-height:100dvh;
    padding:env(safe-area-inset-top) 10px 14px;
  }
  .topbar{display:flex;align-items:center;gap:10px;max-width:560px;margin:0 auto;padding:10px 2px 6px;}
  .topbar h1{flex:1;font-size:20px;margin:0;color:var(--gold);font-variant:small-caps;letter-spacing:1px;}
  .btn{font-family:inherit;font-size:14px;border:1px solid var(--felt-line);border-radius:9px;padding:8px 11px;cursor:pointer;background:transparent;color:var(--gold);}
  .btn.solid{background:var(--gold);color:var(--ink);border:none;font-weight:bold;box-shadow:0 2px 0 var(--gold-dim);}
  .btn:active{transform:translateY(1px);}
  a.btn{text-decoration:none;display:inline-block;}

  .hud{display:flex;justify-content:space-between;align-items:center;max-width:560px;margin:0 auto;background:var(--felt-2);border:1px solid var(--felt-line);border-radius:12px;padding:10px 16px;}
  .hud .item{text-align:center;}
  .hud .big{font-size:26px;color:var(--gold);font-weight:bold;line-height:1;}
  .hud .lbl{font-size:10px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin-top:3px;}
  .hud .face{font-size:30px;cursor:pointer;}

  .diffs{display:flex;gap:6px;max-width:560px;margin:12px auto 0;}
  .diffs .btn{flex:1;text-align:center;font-size:13px;padding:9px 4px;}
  .diffs .btn.active{background:var(--gold-dim);color:var(--ink);border-color:var(--gold-dim);}

  .board-wrap{max-width:560px;margin:14px auto 0;overflow:auto;}
  .grid{display:grid;gap:2px;margin:0 auto;width:max-content;}
  .cell{
    width:var(--cs);height:var(--cs);border-radius:4px;
    background:linear-gradient(160deg,var(--cell-up),var(--cell));
    border:1px solid #0c4634;
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--cs)*.5);font-weight:bold;cursor:pointer;
    line-height:1;
  }
  .cell.open{background:var(--cell-down);border:1px solid #073227;cursor:default;}
  .cell.flag{color:var(--gold);}
  .cell.mine{background:var(--red);}
  .cell.boom{background:#e74c3c;}
  .cell .n1{color:var(--n1)}.cell .n2{color:var(--n2)}.cell .n3{color:var(--n3)}.cell .n4{color:var(--n4)}.cell .n5{color:var(--n5)}.cell .n6{color:var(--n6)}.cell .n7{color:var(--n7)}.cell .n8{color:var(--n8)}

  .mode-row{display:flex;align-items:center;justify-content:center;gap:10px;max-width:560px;margin:14px auto 0;}
  .toggle{display:flex;border:1px solid var(--felt-line);border-radius:10px;overflow:hidden;}
  .toggle button{font-family:inherit;background:transparent;color:var(--cream);border:none;padding:10px 16px;cursor:pointer;font-size:14px;}
  .toggle button.active{background:var(--gold);color:var(--ink);font-weight:bold;}
  .hint-text{max-width:560px;margin:10px auto 0;font-size:12px;color:var(--gold-dim);text-align:center;}

  .overlay{position:fixed;inset:0;background:rgba(5,25,18,.92);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .overlay.show{display:flex;}
  .overlay h2{font-size:32px;margin:0 0 6px;font-variant:small-caps;}
  .overlay.win h2{color:var(--gold);}
  .overlay.lose h2{color:var(--red);}
  .overlay p{color:var(--cream);margin:0 0 20px;}
</style>
</head>
<body>
<div class="topbar">
  <a class="btn" href="index.html">‹ Menu</a>
  <h1>Minestryger</h1>
</div>

<div class="hud">
  <div class="item"><div class="big" id="mineCount">10</div><div class="lbl">Miner</div></div>
  <div class="face" id="face">🙂</div>
  <div class="item"><div class="big" id="time">0</div><div class="lbl">Tid</div></div>
</div>

<div class="diffs">
  <button class="btn active" data-diff="let">Let</button>
  <button class="btn" data-diff="mellem">Mellem</button>
  <button class="btn" data-diff="svaer">Svær</button>
</div>

<div class="board-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="mode-row">
  <div class="toggle">
    <button id="modeDig" class="active">⛏ Grav</button>
    <button id="modeFlag">🚩 Flag</button>
  </div>
</div>
<div class="hint-text">Tryk for at grave. Skift til flag-tilstand for at markere miner — eller hold fingeren nede på et felt.</div>

<div class="overlay" id="overlay">
  <h2 id="ovTitle"></h2>
  <p id="ovText"></p>
  <button class="btn solid" id="ovNew" style="font-size:17px;padding:13px 22px;">Spil igen</button>
</div>

<script>
const $=id=>document.getElementById(id);
const DIFFS={
  let:{r:9,c:9,m:10},
  mellem:{r:16,c:12,m:30},
  svaer:{r:20,c:14,m:55},
};
let diff='let', grid, rows, cols, mines, opened, flags, started, dead, won, timer, time, flagMode=false;

function init(){
  const d=DIFFS[diff];rows=d.r;cols=d.c;mines=d.m;
  grid=[];opened=0;flags=0;started=false;dead=false;won=false;time=0;
  clearInterval(timer);$('time').textContent='0';$('face').textContent='🙂';
  $('mineCount').textContent=mines;
  for(let r=0;r<rows;r++){grid[r]=[];for(let c=0;c<cols;c++)grid[r][c]={mine:false,open:false,flag:false,n:0};}
  // cell size to fit width
  const wrap=document.querySelector('.board-wrap');
  const avail=Math.min(wrap.clientWidth||540,540)-4;
  const cs=Math.max(22,Math.floor((avail-(cols-1)*2)/cols));
  const g=$('grid');g.style.setProperty('--cs',cs+'px');
  g.style.gridTemplateColumns=`repeat(${cols},${cs}px)`;
  render();
}
function plantMines(sr,sc){
  // avoid first click + neighbours
  const safe=new Set();
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const r=sr+dr,c=sc+dc;if(r>=0&&r<rows&&c>=0&&c<cols)safe.add(r+','+c);
  }
  let placed=0;
  while(placed<mines){
    const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(grid[r][c].mine||safe.has(r+','+c))continue;
    grid[r][c].mine=true;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(grid[r][c].mine)continue;
    let n=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const rr=r+dr,cc=c+dc;if(rr>=0&&rr<rows&&cc>=0&&cc<cols&&grid[rr][cc].mine)n++;
    }
    grid[r][c].n=n;
  }
}
function startTimer(){started=true;timer=setInterval(()=>{time++;$('time').textContent=time;},1000);}

function open(r,c){
  const cell=grid[r][c];
  if(cell.open||cell.flag||dead||won)return;
  if(!started){plantMines(r,c);startTimer();}
  if(cell.mine){
    cell.open=true;dead=true;clearInterval(timer);
    revealMines(r,c);$('face').textContent='💥';render();
    endGame(false);return;
  }
  flood(r,c);
  render();
  checkWin();
}
function flood(r,c){
  const cell=grid[r][c];
  if(cell.open||cell.flag)return;
  cell.open=true;opened++;
  if(cell.n===0){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const rr=r+dr,cc=c+dc;
      if(rr>=0&&rr<rows&&cc>=0&&cc<cols&&!(dr===0&&dc===0))flood(rr,cc);
    }
  }
}
function toggleFlag(r,c){
  const cell=grid[r][c];
  if(cell.open||dead||won)return;
  cell.flag=!cell.flag;flags+=cell.flag?1:-1;
  $('mineCount').textContent=mines-flags;
  render();
}
function revealMines(br,bc){
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=grid[r][c];
    if(cell.mine)cell.open=true;
  }
  if(br!==undefined)grid[br][bc].boom=true;
}
function checkWin(){
  if(opened===rows*cols-mines){
    won=true;clearInterval(timer);$('face').textContent='😎';
    // auto-flag remaining
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c].mine)grid[r][c].flag=true;
    $('mineCount').textContent='0';render();endGame(true);
  }
}
function endGame(win){
  const ov=$('overlay');ov.className='overlay show '+(win?'win':'lose');
  $('ovTitle').textContent=win?'Klaret!':'Bang!';
  $('ovText').textContent=win?`Alle miner fundet på ${time} sek.`:'Du ramte en mine.';
}

function render(){
  const g=$('grid');g.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=grid[r][c];
    const el=document.createElement('div');
    el.className='cell';
    if(cell.open){
      el.classList.add('open');
      if(cell.mine){el.classList.add(cell.boom?'boom':'mine');el.textContent='💣';}
      else if(cell.n>0){el.innerHTML=`<span class="n${cell.n}">${cell.n}</span>`;}
    }else if(cell.flag){el.classList.add('flag');el.textContent='🚩';}
    bindCell(el,r,c);
    g.appendChild(el);
  }
}
function bindCell(el,r,c){
  let lpTimer=null,longPressed=false;
  el.addEventListener('touchstart',e=>{
    longPressed=false;
    lpTimer=setTimeout(()=>{longPressed=true;toggleFlag(r,c);if(navigator.vibrate)navigator.vibrate(30);},380);
  },{passive:true});
  el.addEventListener('touchend',e=>{
    clearTimeout(lpTimer);
    if(longPressed){e.preventDefault();return;}
  });
  el.addEventListener('touchmove',()=>clearTimeout(lpTimer),{passive:true});
  el.onclick=e=>{
    if(longPressed)return;
    if(flagMode)toggleFlag(r,c);else open(r,c);
  };
  el.oncontextmenu=e=>{e.preventDefault();toggleFlag(r,c);};
}

/* controls */
document.querySelectorAll('.diffs .btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.diffs .btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');diff=b.dataset.diff;$('overlay').classList.remove('show');init();
  };
});
$('modeDig').onclick=()=>{flagMode=false;$('modeDig').classList.add('active');$('modeFlag').classList.remove('active');};
$('modeFlag').onclick=()=>{flagMode=true;$('modeFlag').classList.add('active');$('modeDig').classList.remove('active');};
$('face').onclick=()=>{$('overlay').classList.remove('show');init();};
$('ovNew').onclick=()=>{$('overlay').classList.remove('show');init();};
window.addEventListener('resize',()=>{if(grid)init();});

init();
</script>
</body>
</html>
