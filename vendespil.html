<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vendespil">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3d2e'/%3E%3Crect x='14' y='16' width='16' height='22' rx='3' fill='%2315604a'/%3E%3Crect x='34' y='26' width='16' height='22' rx='3' fill='%23f7f2e6'/%3E%3C/svg%3E">
<title>Vendespil</title>
<style>
  :root{--felt:#0a3d2e;--felt-2:#0d4a37;--felt-line:#10573f;--gold:#e8c468;--gold-dim:#b89640;--cream:#f3ead6;--ink:#0a2018;--back:#15604a;--shadow:rgba(0,0,0,.4);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;}
  body{font-family:"Georgia",serif;background:radial-gradient(ellipse at 50% 0%, var(--felt-2), var(--felt) 75%);color:var(--cream);min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top) 12px 16px;}
  .wrap{max-width:480px;margin:0 auto;}
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 2px 6px;}
  .topbar h1{flex:1;font-size:20px;margin:0;color:var(--gold);font-variant:small-caps;letter-spacing:1px;}
  .topbar .stat{font-size:13px;color:var(--gold-dim);text-align:right;line-height:1.3;}
  .btn{font-family:inherit;font-size:14px;border:1px solid var(--felt-line);border-radius:9px;padding:8px 11px;cursor:pointer;background:transparent;color:var(--gold);}
  .btn.solid{background:var(--gold);color:var(--ink);border:none;font-weight:bold;}
  .btn:active{transform:translateY(1px);}
  a.btn{text-decoration:none;display:inline-block;}
  .diffs{display:flex;gap:6px;margin:6px 0;}
  .diffs .btn{flex:1;text-align:center;font-size:13px;}
  .diffs .btn.active{background:var(--gold-dim);color:var(--ink);border-color:var(--gold-dim);}
  .grid{display:grid;gap:8px;margin-top:10px;}
  .card{aspect-ratio:3/4;border-radius:10px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .35s;}
  .card.flip,.card.done{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;}
  .front{background:repeating-linear-gradient(45deg,#1b6b52 0 8px,#15604a 8px 16px);border:1px solid #0c4634;}
  .front::after{content:"?";color:rgba(255,255,255,.25);font-size:200%;}
  .back{background:#f7f2e6;border:1px solid rgba(0,0,0,.2);transform:rotateY(180deg);font-size:42px;}
  .card.done .back{opacity:.45;}
  .overlay{position:fixed;inset:0;background:rgba(5,25,18,.92);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .overlay.show{display:flex;}
  .overlay h2{font-size:30px;margin:0 0 8px;color:var(--gold);font-variant:small-caps;}
  .overlay p{margin:0 0 18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="btn" href="index.html">‹ Menu</a>
    <h1>Vendespil</h1>
    <div class="stat"><div id="moves">0 forsøg</div><div id="pairs">0 par</div></div>
  </div>
  <div class="diffs">
    <button class="btn active" data-pairs="6">Let (6)</button>
    <button class="btn" data-pairs="8">Mellem (8)</button>
    <button class="btn" data-pairs="10">Svær (10)</button>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div class="overlay" id="overlay"><h2>Flot!</h2><p id="ovText"></p><button class="btn solid" id="ovNew" style="font-size:17px;padding:13px 22px;">Spil igen</button></div>

<script>
const $=id=>document.getElementById(id);
const EMOJIS=['🐺','🦊','🐻','🐼','🦁','🐯','🐸','🐵','🦉','🦄','🐙','🦋','🐝','🐬','🦔','🦦'];
let pairsCount=6,cards,flipped,moves,matched,lock;

function init(){
  const set=EMOJIS.slice(0,pairsCount);
  cards=[...set,...set].map((e,i)=>({e,id:i,done:false}));
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  flipped=[];moves=0;matched=0;lock=false;
  $('overlay').classList.remove('show');$('moves').textContent='0 forsøg';$('pairs').textContent='0 par';
  const cols=pairsCount<=6?3:pairsCount<=8?4:4;
  $('grid').style.gridTemplateColumns=`repeat(${cols},1fr)`;
  render();
}
function render(){
  const g=$('grid');g.innerHTML='';
  cards.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='card'+(c.done?' done':'');
    el.innerHTML=`<div class="face front"></div><div class="face back">${c.e}</div>`;
    el.onclick=()=>flip(i,el);
    g.appendChild(el);
    c.el=el;
  });
}
function flip(i,el){
  if(lock||cards[i].done||flipped.includes(i))return;
  el.classList.add('flip');flipped.push(i);
  if(flipped.length===2){
    moves++;$('moves').textContent=moves+' forsøg';lock=true;
    const [a,b]=flipped;
    if(cards[a].e===cards[b].e){
      setTimeout(()=>{cards[a].done=cards[b].done=true;cards[a].el.classList.add('done');cards[b].el.classList.add('done');matched++;$('pairs').textContent=matched+' par';flipped=[];lock=false;if(matched===pairsCount)win();},400);
    }else{
      setTimeout(()=>{cards[a].el.classList.remove('flip');cards[b].el.classList.remove('flip');flipped=[];lock=false;},800);
    }
  }
}
function win(){$('ovText').textContent=`${pairsCount} par klaret på ${moves} forsøg`;$('overlay').classList.add('show');}
document.querySelectorAll('.diffs .btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.diffs .btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');pairsCount=+b.dataset.pairs;init();});
$('ovNew').onclick=init;
init();
</script>
</body>
</html>
